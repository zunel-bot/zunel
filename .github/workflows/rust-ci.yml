name: rust-ci

on:
  push:
    branches: [main, nightly]
    paths:
      - "rust/**"
      - ".github/workflows/rust-ci.yml"
  pull_request:
    branches: [main, nightly]
    paths:
      - "rust/**"
      - ".github/workflows/rust-ci.yml"

concurrency:
  group: rust-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      # Seed the default config + workspace so tests that exercise
      # the production `~/.zunel/config.json` path (e.g. the MCP
      # self-server pipeline-plumbing tests in `zunel-mcp-self`
      # and `zunel-cli`) don't trip the bare-runner condition that
      # caused four targets to fail across rounds 4–7. Tests that
      # want isolation continue to set their own `ZUNEL_HOME` via
      # `tempfile::tempdir` + `BTreeMap` env — those are unaffected
      # because `ZUNEL_HOME` wins over `$HOME`.
      - name: Seed minimal ~/.zunel/config.json fixture
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p "$HOME/.zunel/workspace"
          cat > "$HOME/.zunel/config.json" <<JSON
          {
            "providers": {},
            "agents": {
              "defaults": {
                "model": "ci-fixture-model",
                "workspace": "$HOME/.zunel/workspace"
              }
            }
          }
          JSON
      - run: cargo test --workspace --no-fail-fast

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: rust/Cargo.toml
